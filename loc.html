<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir Ubicación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loc-body">

    <div class="loc-box">
        <h2>Bomberos Nueva Imperial</h2>
        <p>Para enviar la unidad de emergencia al lugar exacto, necesitamos su ubicación.</p>
        <button id="btn-gps" class="btn-loc">ENVIAR MI UBICACIÓN</button>
        <div id="mensaje-loc">¡Ubicación enviada! La ayuda va en camino.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-NIM0pbgU2w85mWFhqUEkbA3L0_NrimI",
            authDomain: "despachador-58fb8.firebaseapp.com",
            projectId: "despachador-58fb8",
            storageBucket: "despachador-58fb8.firebasestorage.app",
            messagingSenderId: "1024295745401",
            appId: "1:1024295745401:web:8d49683a86a8b1ff7aa1a8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        document.getElementById('btn-gps').addEventListener('click', () => {
            if (!chatId) { alert("Enlace inválido."); return; }
            
            document.getElementById('btn-gps').innerText = "OBTENIENDO...";

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const payload = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        timestamp: Date.now()
                    };
                    
                    try {
                        await setDoc(doc(db, "ubicaciones_externas", chatId), payload);
                        document.getElementById('btn-gps').style.display = 'none';
                        document.getElementById('mensaje-loc').style.display = 'block';
                    } catch (e) {
                        alert("Error al enviar. Revise su internet.");
                        document.getElementById('btn-gps').innerText = "REINTENTAR";
                    }
                }, (error) => {
                    alert("Debe darle permiso al navegador para acceder al GPS.");
                    document.getElementById('btn-gps').innerText = "ENVIAR MI UBICACIÓN";
                }, { enableHighAccuracy: true });
            } else {
                alert("Su teléfono no soporta GPS.");
            }
        });
    </script>
</body>
</html>
