<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GYRAS - Histórico de Emergencias</title>
    <style>
        body { font-family: sans-serif; background: #0A0A0C; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #111; color: #FFEB3B; }
        h1 { color: #FFEB3B; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>GYRAS - Historial de Emergencias</h1>
    <table>
        <thead>
            <tr>
                <th>Fecha Cierre</th>
                <th>Clave</th>
                <th>Dirección</th>
                <th>Unidades</th>
            </tr>
        </thead>
        <tbody id="historial-tbody"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-NIM0pbgU2w85mWFhqUEkbA3L0_NrimI",
            authDomain: "despachador-58fb8.firebaseapp.com",
            projectId: "despachador-58fb8",
            storageBucket: "despachador-58fb8.firebasestorage.app",
            messagingSenderId: "1024295745401",
            appId: "1:1024295745401:web:8d49683a86a8b1ff7aa1a8"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const tbody = document.getElementById('historial-tbody');

        async function cargarHistorial() {
            const q = query(collection(db, "historial_emergencias"));
            const snapshot = await getDocs(q);
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const em = doc.data();
                const fecha = new Date(em.fecha_termino).toLocaleString('es-CL');
                tbody.innerHTML += `<tr>
                    <td>${fecha}</td>
                    <td>${em.code}</td>
                    <td>${em.address}</td>
                    <td>${em.units.join(', ')}</td>
                </tr>`;
            });
        }
        cargarHistorial();
    </script>
</body>
</html>
