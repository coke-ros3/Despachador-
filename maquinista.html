<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Personal - Bomberos</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --bg-dark: #0A0A0C; --bg-panel: #11131C; --border-color: #374151;
            --text-light: #FFFFFF; --text-muted: #9CA3AF;
            --c-green: #4CAF50; --c-red: #F44336; --c-yellow: #FFEB3B; --c-blue: #1976D2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* topbar app */
        .app-header { background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; position: relative; }
        .app-header h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: var(--c-yellow); font-weight: 900; }
        
        /* area de contenido */
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .tab-section { display: none; flex-direction: column; height: 100%; }
        .tab-section.active { display: flex; }

        /* --- ESTILO ALERTHOR --- */
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-weight: bold; font-size: 1.1rem; }
        
        .alert-card { background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .alert-head { background: #9E9E9E; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; position: relative; }
        .alert-head h2 { color: #FFF; font-size: 1.3rem; font-weight: 900; text-transform: uppercase; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .alert-head .icon-bell { position: absolute; left: 15px; font-size: 1.3rem; }
        .alert-head .icon-phone { position: absolute; right: 15px; font-size: 1.3rem; }
        
        .alert-body { padding: 15px; text-align: center; }
        .alert-inst { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }
        
        .action-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin-bottom: 15px; }
        
        .btn-asiste, .btn-no-asiste { background: #000; border-radius: 8px; padding: 15px 5px; color: var(--text-muted); font-weight: bold; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .btn-asiste { border: 2px solid var(--c-green); }
        .btn-asiste:active, .btn-asiste.selected { background: rgba(76, 175, 80, 0.2); color: var(--c-green); }
        .btn-asiste .big-icon { font-size: 3.5rem; display: block; margin-bottom: 5px; color: var(--text-light); font-weight: 900; line-height: 0.8; }
        
        .btn-no-asiste { border: 2px solid var(--c-red); }
        .btn-no-asiste:active, .btn-no-asiste.selected { background: rgba(244, 67, 54, 0.2); color: var(--c-red); }
        .btn-no-asiste .big-icon { font-size: 3.5rem; display: block; margin-bottom: 5px; color: var(--text-light); font-weight: 900; line-height: 0.8; }

        .time-block { display: flex; flex-direction: column; }
        .time-date { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; }
        .time-clock { color: var(--c-yellow); font-size: 2.2rem; font-weight: 900; line-height: 1; margin-top: 2px; }

        .alert-details { text-align: center; margin-top: 10px; }
        .alert-obs { font-size: 1.1rem; font-weight: bold; color: var(--text-light); text-transform: uppercase; margin-bottom: 3px; }
        .alert-address { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }

        /* --- ESTADO MAQUINISTAS --- */
        .selector-container { background: var(--bg-panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; }
        select { width: 100%; padding: 15px; background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border-color); border-radius: 6px; font-size: 1.2rem; font-weight: bold; outline: none; }
        
        .status-container { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        .btn-maq-status { flex: 1; border: none; border-radius: 8px; font-size: 1.5rem; font-weight: 900; color: var(--text-light); cursor: pointer; text-transform: uppercase; transition: transform 0.1s; min-height: 80px; }
        .btn-maq-status:active { transform: scale(0.97); }
        .btn-disponible { background-color: #2E7D32; }
        .btn-fuera { background-color: #4B5563; }

        .current-status-banner { margin-top: 20px; padding: 15px; text-align: center; border-radius: 6px; font-weight: bold; font-size: 1.1rem; background: var(--bg-panel); border: 1px solid var(--border-color); }

        /* bottom nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid #222; display: flex; height: 70px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; text-decoration: none; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--c-yellow); }
        .nav-icon { font-size: 1.6rem; margin-bottom: 3px; }
        .nav-text { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        #loading { position: absolute; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-weight: bold; z-index: 1000; }

        /* config secreta */
        .dev-selector { position: absolute; top: 15px; right: 15px; background: transparent; color: #333; border: none; outline: none; width: 30px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="loading">Conectando con la Central...</div>

    <div class="app-header">
        <h1>SISTEMA DE ALERTAS</h1>
        <select id="vista-selector" class="dev-selector" onchange="window.location.href=this.value">
            <option value="maquinista.html">APP</option>
            <option value="index.html">INICIO</option>
            <option value="central.html">CENTRAL</option>
            <option value="carro.html">CARROS</option>
            <option value="gyras.html">GYRAS</option>
        </select>
    </div>

    <div class="content-area">
        
        <!-- PESTAÑA 1: ALERTAS ALERTHOR -->
        <div id="tab-alertas" class="tab-section active">
            <div id="alertas-container">
                <!-- aqui caen las tarjetas -->
                <div class="empty-state">No hay emergencias activas en este momento.</div>
            </div>
        </div>

        <!-- PESTAÑA 2: ESTADO MAQUINISTA -->
        <div id="tab-estado" class="tab-section">
            <div class="selector-container">
                <label>Seleccione su Indicativo</label>
                <select id="maquinista-select">
                    <option value="91">91</option>
                    <option value="92">92</option>
                    <option value="93">93</option>
                    <option value="94">94</option>
                    <option value="Maquinista 1">Maquinista 1</option>
                    <option value="Maquinista 2">Maquinista 2</option>
                    <option value="Maquinista 3">Maquinista 3</option>
                    <option value="Maquinista 4">Maquinista 4</option>
                    <option value="Maquinista 5">Maquinista 5</option>
                </select>
            </div>

            <div class="status-container">
                <button class="btn-maq-status btn-disponible" id="btn-disponible">ESTOY DISPONIBLE</button>
                <button class="btn-maq-status btn-fuera" id="btn-fuera">FUERA DE SERVICIO</button>
            </div>

            <div class="current-status-banner" id="status-banner">
                ESTADO ACTUAL: <span id="status-text" style="color: var(--text-muted);">DESCONOCIDO</span>
            </div>
        </div>

    </div>

    <!-- barra navegacion inferior -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('alertas', this)">
            <span class="nav-icon">🔔</span>
            <span class="nav-text">Alertas</span>
        </div>
        <div class="nav-item" onclick="switchTab('estado', this)">
            <span class="nav-icon">🚒</span>
            <span class="nav-text">Conductores</span>
        </div>
    </div>

    <!-- js app -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-NIM0pbgU2w85mWFhqUEkbA3L0_NrimI",
            authDomain: "despachador-58fb8.firebaseapp.com",
            projectId: "despachador-58fb8",
            storageBucket: "despachador-58fb8.firebasestorage.app",
            messagingSenderId: "1024295745401",
            appId: "1:1024295745401:web:8d49683a86a8b1ff7aa1a8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // diccionario claves
        const descripciones = {
            '10-0': 'Llamado estructural', '10-1': 'Fuego en vehículos', '10-2': 'Fuego en pastizales', '10-3': 'Rescate simple',
            '10-4': 'Accidentes vehiculares', '10-5': 'Derrame químico', '10-6': 'Emanación de químicos', '10-7': 'Llamado eléctrico',
            '10-8': 'No clasificado', '10-9': 'Otros servicios', '10-10': 'Llamado a escombros', '10-12': 'Apoyo a otros Cuerpos',
            '10-14': 'Accidente aéreo', '10-15': 'Simulacro', '10-17': 'Inundación'
        };

        // tabs logica
        window.switchTab = function(tabId, el) {
            document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        };

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('loading').style.display = 'none';

            // --- SECCION MAQUINISTAS ---
            const selectId = document.getElementById('maquinista-select');
            const btnDisponible = document.getElementById('btn-disponible');
            const btnFuera = document.getElementById('btn-fuera');
            const statusText = document.getElementById('status-text');

            const guardado = localStorage.getItem('cad_mi_indicativo');
            if (guardado) { selectId.value = guardado; }

            selectId.addEventListener('change', () => {
                localStorage.setItem('cad_mi_indicativo', selectId.value);
            });

            async function reportarEstado(nuevoEstado) {
                const conductor = selectId.value;
                const payload = { estado: nuevoEstado, timestamp: Date.now() };
                try {
                    await setDoc(doc(db, "maquinistas", conductor), payload);
                    if(nuevoEstado === 'disponible') {
                        statusText.innerText = 'DISPONIBLE';
                        statusText.style.color = 'var(--c-green)';
                    } else {
                        statusText.innerText = 'FUERA DE SERVICIO';
                        statusText.style.color = 'var(--text-muted)';
                    }
                } catch (error) { alert("Falla de red. Intente nuevamente."); }
            }

            btnDisponible.addEventListener('click', () => reportarEstado('disponible'));
            btnFuera.addEventListener('click', () => reportarEstado('fuera'));

            // --- SECCION ALERTAS ---
            const alertasContainer = document.getElementById('alertas-container');
            
            // simula presionar boton
            window.toggleAsistencia = function(btn, tipo) {
                let parent = btn.closest('.action-row');
                parent.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };

            onSnapshot(doc(db, "operaciones", "despacho_actual"), (docSnap) => {
                alertasContainer.innerHTML = '';
                
                if (docSnap.exists()) {
                    const em = docSnap.data();
                    let dateObj = new Date(em.id);
                    let fecha = dateObj.toISOString().split('T')[0];
                    let hora = dateObj.toLocaleTimeString('es-CL', { hour12: false, hour: '2-digit', minute: '2-digit' });
                    
                    let desc = descripciones[em.code] || 'EMERGENCIA';
                    let titulo = `${em.code} ${desc}`;
                    if(em.alarma > 0) titulo = `${em.alarma}A ALARMA DE INCENDIO`;
                    
                    let htmlCard = `
                        <div class="alert-card">
                            <div class="alert-head">
                                <span class="icon-bell">🔔</span>
                                <h2>${titulo}</h2>
                                <span class="icon-phone">📱</span>
                            </div>
                            <div class="alert-body">
                                <div class="alert-inst">Bomberos Nueva Imperial</div>
                                
                                <div class="action-row">
                                    <button class="btn-asiste" onclick="toggleAsistencia(this, 'si')">
                                        <span class="big-icon">✔</span>ASISTE
                                    </button>
                                    <div class="time-block">
                                        <span class="time-date">${fecha}</span>
                                        <span class="time-clock">${hora}</span>
                                    </div>
                                    <button class="btn-no-asiste" onclick="toggleAsistencia(this, 'no')">
                                        <span class="big-icon">✖</span>NO ASISTE
                                    </button>
                                </div>

                                <div class="alert-details">
                                    <div class="alert-obs">${em.obs || 'Sin observaciones'}</div>
                                    <div class="alert-address">${em.address} (Unidades: ${em.units.join(', ')})</div>
                                </div>
                            </div>
                        </div>
                    `;
                    alertasContainer.innerHTML = htmlCard;
                    
                    // si hay emergencia, cambia a pestaña alertas auto
                    document.querySelector('.nav-item').click(); 
                } else {
                    alertasContainer.innerHTML = '<div class="empty-state">No hay emergencias activas en este momento.</div>';
                }
            });
        });
    </script>
</body>
</html>
