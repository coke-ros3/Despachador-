<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Voluntarios - CB Nueva Imperial</title>
    
    <!-- Hoja de estilos centralizada -->
    <link rel="stylesheet" href="style.css">
    <!-- CSS Leaflet para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="voluntarios-body">

    <!-- =========================================
         VISTA 1: LISTA DE EMERGENCIAS (FEED)
         ========================================= -->
    <div id="v-main-view">
        <div class="v-nav-bar">
            <button class="v-nav-btn"><span>&#10094;</span> Canales</button>
            <div class="v-nav-title">CB Nueva Imperial</div>
            <button class="v-nav-btn" style="font-size: 20px;">🔊</button>
        </div>
        <div id="v-emergencies-list">
            <!-- Se inyecta con Firebase -->
            <div class="v-empty-state">Cargando emergencias...</div>
        </div>
    </div>

    <!-- =========================================
         VISTA 2: DETALLE DE LA EMERGENCIA
         ========================================= -->
    <div id="v-detail-view" style="display: none;">
        <div class="v-nav-bar">
            <button class="v-nav-btn" onclick="cerrarDetalle()"><span>&#10094;</span> Atrás</button>
            <div class="v-nav-title">Notificación</div>
            <div style="width: 50px;"></div> <!-- Espaciador para centrar título -->
        </div>

        <div class="v-inst-header">
            <div style="font-size: 40px;">🛡️</div>
            <h2>Bomberos Nueva Imperial</h2>
        </div>

        <div class="v-blue-banner" id="v-det-banner">
            <!-- Ej: 10-9 AVENIDA DEPARTAMENTAL / EXEQUIEL FERNANDEZ B11 -->
        </div>

        <div class="v-info-block" id="v-det-info">
            <span class="v-info-line" style="color:red; font-weight:bold;" id="v-det-atentado"></span>
            <span class="v-info-line"><strong>Observaciones:</strong> <span id="v-det-obs"></span></span>
        </div>

        <div class="v-units-container" id="v-det-units">
            <!-- Ej: <div class="v-unit-badge">B-1</div> -->
        </div>

        <!-- BOTONES DE NAVEGACIÓN -->
        <div class="v-action-bar">
            <button class="v-action-btn" id="v-btn-waze">📍 Waze</button>
            <button class="v-action-btn" id="v-btn-maps">🗺️ Google Maps</button>
            <button class="v-action-btn" id="v-btn-apple">🍏 Apple Maps</button>
        </div>

        <!-- Mapa -->
        <div id="v-map-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const app = initializeApp({ 
            apiKey: "AIzaSyA-NIM0pbgU2w85mWFhqUEkbA3L0_NrimI", 
            authDomain: "despachador-58fb8.firebaseapp.com", 
            projectId: "despachador-58fb8" 
        });
        const db = getFirestore(app);

        // Variables del mapa
        let map;
        const mapboxToken = 'pk.eyJ1Ijoiam9yZ2VsYW5kZXIiLCJhIjoiY21yazBmNngzMDBiNDJ5b2pkMjF3dHljbCJ9.cbcHOpTihe9Y-9l6HZHjAw';
        let volunteerMarker = null; // Rastrea el pin para no duplicarlo

        // Escuchar emergencias activas (ordenadas por fecha descendente)
        const q = query(collection(db, "emergencias_activas"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('v-emergencies-list');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                list.innerHTML = '<div class="v-empty-state">No hay emergencias activas en este momento.</div>';
                return;
            }

            snapshot.forEach(doc => {
                const d = doc.data();
                const timeStr = d.timestamp ? d.timestamp.toDate().toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'medium' }) : '';
                const unitsStr = (d.units || []).join(', ');
                
                let item = document.createElement('div');
                item.className = 'v-feed-item';
                item.onclick = () => abrirDetalle(d);
                
                item.innerHTML = `
                    <div class="v-feed-content">
                        <span class="v-feed-date">${timeStr}</span>
                        <div class="v-feed-title">${d.code} ${d.address} ${unitsStr}</div>
                        ${d.isAtentado ? '<div style="color:red; font-size:11px; font-weight:bold; margin-top:3px;">⚠️ POSIBLE ATENTADO</div>' : ''}
                    </div>
                    <span class="v-chevron">&#10095;</span>
                `;
                list.appendChild(item);
            });
        });

        window.abrirDetalle = (d) => {
            document.getElementById('v-main-view').style.display = 'none';
            document.getElementById('v-detail-view').style.display = 'block';

            // Llenar datos textuales
            const unitsStr = (d.units || []).join(', ');
            document.getElementById('v-det-banner').innerText = `${d.code} ${d.address} ${unitsStr}`;
            
            document.getElementById('v-det-atentado').innerText = d.isAtentado ? "⚠️ DESPACHADO COMO POSIBLE ATENTADO" : "";
            document.getElementById('v-det-obs').innerText = d.obs || "Sin observaciones previas.";

            // Generar insignias de las máquinas despachadas
            const unitsContainer = document.getElementById('v-det-units');
            unitsContainer.innerHTML = '';
            (d.units || []).forEach(u => {
                let badge = document.createElement('div');
                badge.className = 'v-unit-badge';
                badge.innerText = u;
                unitsContainer.appendChild(badge);
            });

            // Configurar botones de navegación externa
            const encodedAddress = encodeURIComponent(d.address + ", Nueva Imperial, Chile");
            document.getElementById('v-btn-waze').onclick = () => {
                window.location.href = `https://waze.com/ul?q=${encodedAddress}`;
            };
            document.getElementById('v-btn-maps').onclick = () => {
                window.location.href = `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
            };
            document.getElementById('v-btn-apple').onclick = () => {
                window.location.href = `http://maps.apple.com/?q=${encodedAddress}`;
            };

            // CONFIGURACIÓN DINÁMICA DEL MAPA (Reacciona a las coordenadas de la central)
            setTimeout(() => {
                if (!map) {
                    map = L.map('v-map-container', { zoomControl: false });
                    L.tileLayer(`https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/{z}/{x}/{y}?access_token=${mapboxToken}`, {
                        maxZoom: 19
                    }).addTo(map);
                    L.control.zoom({ position: 'bottomright' }).addTo(map);
                }

                // Si la emergencia tiene coordenadas, pon el pin y centra el mapa ahí
                if (d.markerLatLng) {
                    const emergencyPos = [d.markerLatLng.lat, d.markerLatLng.lng];
                    map.setView(emergencyPos, 16);

                    if (volunteerMarker) map.removeLayer(volunteerMarker);
                    
                    volunteerMarker = L.marker(emergencyPos, {
                        icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png', iconSize: [25, 41], iconAnchor: [12, 41] })
                    }).addTo(map).bindPopup(`<b>${d.code}</b><br>${d.address}`).openPopup();
                } else {
                    // Posición por defecto en Nueva Imperial si la central no marcó un punto
                    map.setView([-38.7423, -72.9538], 15);
                    if (volunteerMarker) map.removeLayer(volunteerMarker);
                }

                map.invalidateSize(); 
            }, 300);
        };

        window.cerrarDetalle = () => {
            document.getElementById('v-detail-view').style.display = 'none';
            document.getElementById('v-main-view').style.display = 'block';
        };
    </script>
</body>
</html>
